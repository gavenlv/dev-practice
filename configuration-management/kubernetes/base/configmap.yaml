apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
data:
  APP_NAME: "myapp"
  APP_PORT: "8080"
  LOG_LEVEL: "info"
  DATABASE_PORT: "5432"
  DATABASE_SSL_MODE: "require"
  DATABASE_MAX_CONNECTIONS: "10"
  REDIS_PORT: "6379"
  REDIS_SSL: "true"
  REDIS_POOL_SIZE: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config-files
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
data:
  config.yaml: |
    app:
      name: myapp
      port: 8080
      log_level: info
      timeout: 30s
    
    database:
      port: 5432
      ssl_mode: require
      max_connections: 10
      connection_timeout: 30s
      conn_max_lifetime: 1h
    
    redis:
      port: 6379
      ssl: true
      pool_size: 10
    
    pubsub:
      subscription_timeout: 30s
